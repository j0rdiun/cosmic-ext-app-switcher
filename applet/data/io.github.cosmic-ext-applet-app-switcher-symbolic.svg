<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none">
  <!-- floating panel -->
  <rect x="0.5" y="3.75" width="15" height="8.5" rx="3" fill="currentColor" fill-opacity="0.15"/>
  <!-- selection highlight behind centre icon -->
  <rect x="5.5" y="4.5" width="5" height="7" rx="2" fill="currentColor" fill-opacity="0.28"/>
  <!-- left app thumbnail (unselected) -->
  <rect x="1.75" y="6" width="3" height="4" rx="1" fill="currentColor" fill-opacity="0.45"/>
  <!-- centre app thumbnail (selected — slightly taller) -->
  <rect x="6.5" y="5.5" width="3" height="5" rx="1" fill="currentColor"/>
  <!-- right app thumbnail (unselected) -->
  <rect x="11.25" y="6" width="3" height="4" rx="1" fill="currentColor" fill-opacity="0.45"/>
</svg>
